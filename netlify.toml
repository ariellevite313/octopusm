[build]
  command       = "npm run build"
  publish       = "dist"

[build.environment]
  NODE_VERSION  = "20"

# SPA fallback — toutes les routes renvoient vers index.html
# React Router gère ensuite le routing côté client
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Assets statiques — cache long terme (hash dans le nom de fichier)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html — jamais mis en cache
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
